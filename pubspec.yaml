name: smartcmr
description: smartCMR mobile app rebuilt in Flutter with the same Firebase and AI integrations.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^5.6.8
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  flutter_markdown: ^0.7.7+1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  http: ^1.2.1
  intl: ^0.19.0
  path_provider: ^2.1.3
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^13.1.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/smartcmr_logo.svg
    

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/smartcmr_logo.svg"
